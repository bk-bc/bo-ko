<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧零售管理系統 v5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107;
            --pink: hotpink; --yellow: gold; --lightblue: lightblue;
            --bg-color: #f4f6f9; --card-bg: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg-color); padding-bottom: 60px; }
        
        /* Sticky Header */
        header {
            position: sticky; top: 0; z-index: 1000; background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 10px; margin-bottom: 15px;
        }
        .header-stats { font-size: 0.85em; color: #666; margin-bottom: 5px; }
        .nav-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .nav-buttons button { flex: 1 1 auto; padding: 8px; border: 1px solid #ddd; background: #f8f9fa; border-radius: 4px; cursor: pointer; }
        .nav-buttons button.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Layout & Cards */
        .container { padding: 0 10px; max-width: 100%; margin: 0 auto; }
        .section { display: none; }
        .section.active { display: block; }

        /* =============================================
           修正1：卡片基礎樣式 - 移除重複定義，統一為一份
           ============================================= */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
            word-break: break-all;
        }

        /* =============================================
           修正2：card-title 移除固定高度，讓文字自然展開
           ============================================= */
        .card-title {
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 5px;
            word-break: break-all;
            white-space: normal;
            line-height: 1.3;
        }
        .card-sub { font-size: 0.85em; color: #555; margin-bottom: 5px; word-break: break-all; }
        .card-actions { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .no-print button, .btn-danger, .btn-warning {
            flex-shrink: 0 !important;
            white-space: nowrap !important;
        }
        
        /* Inputs & Buttons */
        input, select, textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: black; }
        .btn-pink { background: var(--pink); color: white; }
        .btn-yellow { background: var(--yellow); color: black; }
        .btn-lightblue { background: var(--lightblue); color: black; }
        
        .flex-row { display: flex; gap: 10px; flex-wrap: nowrap; align-items: center; margin-bottom: 10px; }
        .flex-row > * { flex: 1; }
        
        svg.barcode { width: 100%; max-height: 80px; }

        /* 品保：動態多頁分欄，基準為A4列印寬度 */
        .qa-print-container { display: none; }
        .qa-screen-container { display: block; }

        /* 外層包裝：控制縮放後的實際佔位高度 */
        #qaResultWrapper {
            width: 100%;
            overflow: hidden;
        }

        /* 主容器：固定730px寬，由JS動態scale縮放適應螢幕 */
        #qaResult {
            display: flex;
            flex-direction: column;
            gap: 0;
            width: 730px;
            transform-origin: top left;
            /* transform: scale(X) 由 JS 動態寫入 */
        }

        /* 每頁：左右兩欄並排 */
        .qa-page-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 6px;
            width: 730px;
            margin-bottom: 16px;
        }

        /* 每欄固定362px */
        .qa-col {
            flex: 0 0 362px;
            width: 362px;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 每個日期群組 */
        .qa-group {
            border: 2px solid #333;
            border-radius: 6px;
            padding: 6px;
            background: #fff;
            break-inside: avoid;
            page-break-inside: avoid;
            width: 100%;
            box-sizing: border-box;
        }
        .qa-group-title {
            font-weight: bold;
            font-size: 0.9em;
            border-bottom: 1px solid #ccc;
            margin-bottom: 5px;
            padding-bottom: 3px;
            overflow: hidden;
        }

        /* 群組內商品：兩小欄並排 */
        .qa-items-row {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 4px;
        }
        .qa-items-col {
            flex: 1 1 0;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        /* 商品卡片 */
        .qa-item-card {
            border: 1px dashed #999;
            border-radius: 3px;
            padding: 4px;
            text-align: center;
            background: rgba(255,255,255,0.8);
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .qa-item-title {
            font-size: 14px;
            font-weight: bold;
            line-height: 1.25;
            word-break: break-all;
            margin-bottom: 2px;
        }
        .qa-item-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 3px;
        }

        /* 品保三色 */
        .bg-month-current { background-color: #ffe6e6 !important; }
        .bg-month-next    { background-color: #ffe5b4 !important; }
        .bg-month-future  { background-color: #ffffcc !important; }

        /* =============================================
           修正3：搜尋網格 - 手機預設兩欄，平板/桌機四欄
           ============================================= */
        .search-grid-container {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .search-column {
            flex: 0 0 50%;       /* 手機：兩欄 */
            max-width: 50%;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 4px;
            box-sizing: border-box;
        }

        /* 平板以上：四欄 */
        @media screen and (min-width: 900px) {
            .search-column {
                flex: 0 0 25%;
                max-width: 25%;
            }
        }

        .card svg.barcode {
            width: 100% !important;
            height: auto !important;
            max-height: 60px;
        }

        /* 品保外層佈局 */
        #qaResult {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            width: 100%;
        }
        @media (min-width: 900px) {
            #qaResult { grid-template-columns: 1fr 1fr; }
        }

        .qa-group {
            border: 2px solid #333;
            border-radius: 6px;
            padding: 6px;
            background: #fff;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        .qa-group-title {
            text-align: center;
            font-weight: bold;
            border-bottom: 1px solid #ccc;
            margin-bottom: 6px;
            padding-bottom: 4px;
        }
        .qa-items-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }
        .qa-items-container .card {
            border: 1px dashed #666;
            padding: 4px;
            text-align: center;
        }

        /* =============================================
           列印樣式
           ============================================= */
        @media print {
            /* 隱藏不需要列印的元素 */
            header, .no-print, .card-sub { display: none !important; }
            body { padding: 0; background: white; }
            .container { padding: 0; }

            /* ══════════════════════════════════════════
               搜尋列印
               • 高度 -10%：267mm → 240mm
               • justify-content: flex-start（不拉寬間距）
               • 文字 180%、白動跨行（不限行數、不裁切）
               • 條碼固定高度，卡片高度自動由文字+條碼撐開
               ══════════════════════════════════════════ */
            .search-grid-container {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                align-items: flex-start !important;
                width: 100% !important;
                /* 不給固定高度，讓卡片自然堆疊 */
            }
            .search-column {
                flex: 0 0 25% !important;
                max-width: 25% !important;
                padding: 0 2px !important;
                gap: 0 !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: flex-start !important;  /* 不拉寬間距 */
                align-items: stretch !important;
            }

            /* 卡片：高度由內容決定，每張約佔 240mm/12 = 20mm */
            .search-column .card {
                height: calc(240mm / 12) !important;     /* -10%後每格高度 */
                overflow: hidden !important;
                border: 0.5pt solid #000 !important;
                margin: 0 0 1px 0 !important;
                padding: 2px 3px !important;
                box-shadow: none !important;
                border-radius: 1px !important;
                display: flex !important;
                flex-direction: column !important;
                justify-content: flex-start !important;
                box-sizing: border-box !important;
            }

            /* 文字：180%、自動跨行、不裁切行數 */
            .search-column .card-title {
                font-size: 18px !important;              /* 180%（基準約10px） */
                font-weight: bold !important;
                line-height: 1.25 !important;
                white-space: normal !important;
                overflow: hidden !important;
                word-break: break-all !important;
                margin: 0 0 2px 0 !important;
                flex-shrink: 0 !important;
                /* 不加 -webkit-line-clamp，讓文字自然跨行 */
            }

            /* 條碼：撐滿卡片剩餘空間 */
            .search-column .barcode-wrapper {
                flex: 1 1 0 !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                overflow: hidden !important;
                min-height: 0 !important;
            }
            .search-column .barcode {
                width: 100% !important;
                height: 100% !important;
                max-height: 26px !important;
                display: block !important;
            }

            /* ══════════════════════════════════════════
               品保列印：直接沿用螢幕動態分欄佈局
               ══════════════════════════════════════════ */
            .qa-screen-container, .qa-print-container { display: none !important; }

            #qaResultWrapper {
                width: 100% !important;
                height: auto !important;
            }
            #qaResult {
                display: flex !important;
                flex-direction: column !important;
                width: 100% !important;
                transform: none !important;
                margin: 0 !important;
            }
            .qa-page-row {
                display: flex !important;
                flex-direction: row !important;
                align-items: flex-start !important;
                gap: 5px !important;
                width: 100% !important;
                page-break-after: always !important;
                margin-bottom: 0 !important;
            }
            .qa-page-row:last-child {
                page-break-after: auto !important;
            }
            .qa-col {
                flex: 1 1 0 !important;
                width: auto !important;
                min-width: 0 !important;
            }
            .qa-group {
                border: 1pt solid #333 !important;
                border-radius: 2px !important;
                padding: 3px !important;
                margin-bottom: 4px !important;
                box-shadow: none !important;
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }
            .qa-group-title {
                font-size: 10px !important;
                padding-bottom: 2px !important;
                margin-bottom: 3px !important;
            }
            .qa-item-card {
                border: 0.5pt dashed #666 !important;
                padding: 2px !important;
                box-shadow: none !important;
                break-inside: avoid !important;
                page-break-inside: avoid !important;
            }
            .qa-item-title {
                font-size: 14px !important;
            }
            .qa-item-actions { display: none !important; }
            .qa-item-card .barcode {
                width: 95% !important;
                height: 28px !important;
                display: block !important;
                margin: 0 auto !important;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-stats" id="headerStats">資料統計：總導入 0 | 合併數 0 | 總筆數 0</div>
    <div class="flex-row">
        <input type="file" id="csvFile" accept=".csv" style="flex: 2; margin-bottom: 0;">
        <button class="btn-primary" onclick="importCSV()">匯入 CSV</button>
        <button class="btn-success" onclick="exportCSV()">匯出 CSV</button>
    </div>
    <div class="nav-buttons" style="margin-top: 10px;">
        <button onclick="switchTab('add')" id="btn-add" class="active">新增</button>
        <button onclick="switchTab('search')" id="btn-search">搜尋</button>
        <button onclick="switchTab('error')" id="btn-error">勘誤</button>
        <button onclick="switchTab('qa')" id="btn-qa">品保</button>
        <button onclick="switchTab('classify')" id="btn-classify">分類</button>
        <button onclick="switchTab('activity')" id="btn-activity">活動</button>
    </div>
</header>

<div class="container">
    <div id="add" class="section active">
        <h3>新增資料</h3>
        <select id="addType">
            <option value="EAN8">EAN8</option><option value="EAN13">EAN13</option>
            <option value="UPCA">UPCA</option><option value="UPCE">UPCE</option>
            <option value="I35">I35</option><option value="I24">I24</option>
        </select>
        <textarea id="addInput" rows="6" placeholder="請輸入資料，每行格式：ID/Name"></textarea>
        <button class="btn-primary" onclick="addItems()" style="width: 100%;">新增</button>
    </div>

    <div id="search" class="section">
        <div class="flex-row no-print">
            <label><input type="checkbox" id="freshFoodCheck" onchange="renderSearch()"> 鮮食</label>
            <label><input type="checkbox" id="shortcutToggle" checked onchange="renderSearch()"> 快捷鍵</label>
            <button class="btn-success" onclick="clearOrder()">已訂貨</button>
            <button class="btn-primary" onclick="window.print()">🖨️ 列印標籤</button>
        </div>
        <div id="searchFilters" class="no-print">
            <div class="flex-row">
                <select id="searchC1" onchange="renderSearch()"><option value="">C1: 全部搜尋</option></select>
                <select id="searchEvent" onchange="renderSearch()"><option value="">Event: 全部搜尋</option></select>
            </div>
            <div class="flex-row">
                <input type="text" id="searchKeyword1" placeholder="關鍵字 1 (ID/Name)" oninput="renderSearch()">
                <input type="text" id="searchKeyword2" placeholder="關鍵字 2 (ID/Name)" oninput="renderSearch()">
            </div>
        </div>
        <div class="header-stats no-print" id="searchCount"></div>
        <div id="searchResult"></div>
    </div>

    <div id="error" class="section">
        <div class="header-stats" id="errorStats"></div>
        <div id="errorResult"></div>
    </div>

    <div id="qa" class="section">
        <div class="flex-row no-print">
            <label><input type="checkbox" id="qaBarcodeToggle" checked onchange="renderQA()"> 顯示條碼</label>
            <button class="btn-primary" onclick="window.print()">列印</button>
        </div>
        <div id="qaResultWrapper">
            <div id="qaResult" class="print-container"></div>
        </div>
    </div>

    <div id="classify" class="section">
        <div class="flex-row">
            <select id="classifySelect" onchange="handleClassifySelect()">
                <option value="">選擇分類</option>
                <option value="NEW_CATEGORY">-- 新增分類 --</option>
            </select>
            <input type="text" id="newCategoryInput" placeholder="輸入新分類名稱" style="display:none; flex:1; margin-bottom:0;">
            <button class="btn-primary" onclick="applyClassification()">分類</button>
        </div>
        <div id="classifyResult"></div>
    </div>

    <div id="activity" class="section">
        <div id="activityTags" class="nav-buttons" style="margin-bottom: 10px;"></div>
        <input type="text" id="activityInput" placeholder="輸入活動名稱">
        <textarea id="activitySearch" rows="4" placeholder="貼上多行關鍵字搜尋 Name" oninput="searchActivity()"></textarea>
        <div id="activitySearchResult" style="margin-bottom:10px; font-size:0.9em; color:#555;"></div>
        <button class="btn-primary" onclick="addActivity()" style="width: 100%;">加入活動</button>
    </div>
</div>
<input type="date" id="hiddenDatePicker" style="position:fixed; top:-100px; left:-100px; opacity:0;">

<script>
    // --- 核心資料狀態 ---
    let db = []; 
    let stats = { imported: 0, merged: 0 };

    // --- 初始化 ---
    window.onload = () => {
        const stored = localStorage.getItem('retailDB');
        if (stored) {
            let rawData = JSON.parse(stored);
            rawData.forEach(item => {
                if (item.Locked === undefined || item.Locked === 'undefined' || item.Locked === null || item.Locked === '') {
                    item.Locked = 'False';
                }
                if (!item.C1) item.C1 = '未分類';
                item.Expiry = cleanArrayStr(item.Expiry, true);
                item.Event = cleanArrayStr(item.Event, false, item.Name, item.ID);
            });
            db = []; 
            rawData.forEach(item => { upsertItem(item); });
            saveData();
        }
        updateStatsUI();
        renderAddType();
    };

    function saveData() {
        localStorage.setItem('retailDB', JSON.stringify(db));
        updateStatsUI();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-buttons button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById(`btn-${tabId}`).classList.add('active');
        
        if(tabId === 'search') { document.getElementById('searchKeyword1').value=''; document.getElementById('searchKeyword2').value=''; populateSearchDropdowns(); renderSearch(); }
        if(tabId === 'error') renderError();
        if(tabId === 'qa') renderQA();
        if(tabId === 'classify') renderClassify();
        if(tabId === 'activity') renderActivity();
    }

    // --- 共用工具 ---
    function cleanArrayStr(str, isDate = false, itemName = '', itemID = '') {
        if (!str) return '';
        let arr = str.split('/').map(s => s.trim()).filter(Boolean);
        if (isDate) {
            arr = arr.filter(d => /^20\d{6}$/.test(d));
            arr.sort();
        } else {
            const today = new Date();
            const expirationDays = 30;
            arr = arr.filter(e => {
                const exactMatchRegex = new RegExp(`^(${escapeRegExp(itemName)}|${escapeRegExp(itemID)})$`, 'i');
                if (exactMatchRegex.test(e)) return false;
                const dateMatch = e.match(/^(\d{8})_/);
                if (dateMatch) {
                    const eventDateStr = dateMatch[1];
                    if (eventDateStr.substring(0, 2) === "20") {
                        const year = parseInt(eventDateStr.substring(0, 4));
                        const month = parseInt(eventDateStr.substring(4, 6)) - 1;
                        const day = parseInt(eventDateStr.substring(6, 8));
                        const eventDate = new Date(year, month, day);
                        if (!isNaN(eventDate.getTime())) {
                            const diffTime = today - eventDate;
                            const diffDays = diffTime / (1000 * 60 * 60 * 24);
                            if (diffDays > expirationDays) return false;
                        }
                    }
                }
                return true;
            });
        }
        return [...new Set(arr)].join('/');
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function updateStatsUI() {
        document.getElementById('headerStats').innerText = `資料統計：總導入 ${stats.imported} | 合併數 ${stats.merged} | 總筆數 ${db.length}`;
    }

    function getJulian(addDays = 0) {
        let d = new Date(); d.setDate(d.getDate() + addDays);
        let start = new Date(d.getFullYear(), 0, 0);
        let diff = (d - start) + ((start.getTimezoneOffset() - d.getTimezoneOffset()) * 60 * 1000);
        let oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay).toString().padStart(3, '0');
    }

    function renderBarcode(targetId, value, format) {
        try {
            JsBarcode(`#${targetId}`, value, {
                format: format.includes('EAN') || format.includes('UPC') ? format : 'CODE128',
                displayValue: true, height: 35, margin: 0, width: 1.5
            });
        } catch (e) {
            console.error("Barcode error:", e);
        }
    }

    function upsertItem(newItem) {
        const namePrefix = newItem.Name.substring(0, 6);
        const isSixDigits = /^\d{6}$/.test(namePrefix);
        if (!isSixDigits) {
            console.warn(`過濾無效資料：ID ${newItem.ID} 的 Name "${newItem.Name}" 不符合 6 位數字開頭規則。`);
            return { imported: 0, merged: 0 }; 
        }
        let existing = db.filter(i => i.ID === newItem.ID);
        if (existing.length === 0) {
            newItem.Expiry = cleanArrayStr(newItem.Expiry, true);
            newItem.Event = cleanArrayStr(newItem.Event, false, newItem.Name, newItem.ID);
            db.push(newItem);
            return { imported: 1, merged: 0 };
        }
        let allExp = newItem.Expiry || "";
        let allEv = newItem.Event || "";
        existing.forEach(e => {
            allExp += "/" + (e.Expiry || "");
            allEv += "/" + (e.Event || "");
        });
        let finalPooledExpiry = cleanArrayStr(allExp, true);
        newItem.Expiry = finalPooledExpiry;
        newItem.Event = cleanArrayStr(allEv, false, newItem.Name, newItem.ID);
        existing.forEach(e => {
            e.Expiry = finalPooledExpiry;
            e.Event = cleanArrayStr(allEv, false, e.Name, e.ID);
        });
        let perfectMatch = existing.find(e => e.Name === newItem.Name && e.Type === newItem.Type && e.C1 === newItem.C1);
        if (perfectMatch) {
            if (newItem.Locked === 'True') perfectMatch.Locked = 'True';
            return { imported: 0, merged: 1 };
        }
        let lockedExisting = existing.filter(e => e.Locked === 'True');
        let totalLocks = lockedExisting.length + (newItem.Locked === 'True' ? 1 : 0);
        if (totalLocks === 0) {
            db.push(newItem); 
            return { imported: 1, merged: 0 };
        } else if (totalLocks === 1) {
            if (newItem.Locked === 'True') {
                db = db.filter(i => i.ID !== newItem.ID);
                db.push(newItem);
                return { imported: 1, merged: existing.length };
            } else {
                return { imported: 0, merged: 1 };
            }
        } else {
            existing.forEach(e => { if(e.Locked === 'True') e.Locked = 'False'; });
            newItem.Locked = 'False';
            db.push(newItem);
            return { imported: 1, merged: 0 };
        }
    }

    function importCSV() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert('請選擇CSV檔案');
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let processedCount = 0; let newMergeCount = 0; let newAddCount = 0;
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const parts = lines[i].split(',').map(s => s.trim().replace(/^"|"$/g, ''));
                if (parts.length < 7) continue;
                let [Type, ID, Name, C1, Expiry, Event, Locked] = parts;
                Type = Type.toUpperCase();
                Locked = (Locked === 'True') ? 'True' : 'False';
                processedCount++;
                let newItem = {Type, ID, Name, C1, Expiry, Event, Locked};
                let res = upsertItem(newItem);
                newAddCount += res.imported;
                newMergeCount += res.merged;
            }
            stats.imported += processedCount;
            stats.merged += newMergeCount;
            saveData();
            alert(`匯入完成！共掃描 ${processedCount} 筆資料。\n(新增或衝突 ${newAddCount} 筆，成功合併 ${newMergeCount} 筆)`);
            if (document.getElementById('search').classList.contains('active')) renderSearch();
            if (document.getElementById('error').classList.contains('active')) renderError();
        };
        reader.readAsText(file);
    }

    function exportCSV() {
        let csv = "Type,ID,Name,C1,Expiry,Event,Locked\n";
        db.forEach(row => {
            csv += `"${row.Type}","${row.ID}","${row.Name}","${row.C1}","${row.Expiry}","${row.Event}","${row.Locked}"\n`;
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `零售資料庫_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    function renderSearch() {
        const isFresh = document.getElementById('freshFoodCheck').checked;
        const c1 = document.getElementById('searchC1').value;
        const ev = document.getElementById('searchEvent').value;
        const kw1 = document.getElementById('searchKeyword1').value.trim().toLowerCase();
        const kw2 = document.getElementById('searchKeyword2').value.trim().toLowerCase();
        const resDiv = document.getElementById('searchResult');
        const searchFilters = document.getElementById('searchFilters');
        const showShortcuts = document.getElementById('shortcutToggle').checked;
        
        resDiv.innerHTML = '';
        
        if (isFresh) {
            document.getElementById('searchC1').style.display = 'none';
            document.getElementById('searchEvent').style.display = 'none';
            document.getElementById('searchKeyword2').style.display = 'none';
            searchFilters.style.display = 'block';
            if (kw1.length < 1) {
                document.getElementById('searchCount').innerText = '請輸入鮮食名稱進行搜尋...';
                return;
            }
        } else {
            document.getElementById('searchC1').style.display = 'block';
            document.getElementById('searchEvent').style.display = 'block';
            document.getElementById('searchKeyword2').style.display = 'block';
            searchFilters.style.display = 'block';
            if (kw1.length < 1 && kw2.length < 1 && !c1 && !ev) {
                document.getElementById('searchCount').innerText = '輸入關鍵字或選擇篩選項目...';
                return;
            }
        }

        let filtered = db.filter(item => {
            if (isFresh) {
                if (item.Type !== 'I24' && item.Type !== 'I35') return false;
                const match1 = kw1 ? item.Name.toLowerCase().includes(kw1) : true;
                const match2 = kw2 ? item.Name.toLowerCase().includes(kw2) : true;
                return (kw1 || kw2) && match1 && match2;
            } else {
                if (c1 && item.C1 !== c1) return false;
                if (ev && !item.Event.split('/').some(e => e.replace(/_\d{3}$/, '') === ev)) return false;
                let textMatch = (kw1 === '' || item.ID.toLowerCase().includes(kw1) || item.Name.toLowerCase().includes(kw1)) &&
                                (kw2 === '' || item.ID.toLowerCase().includes(kw2) || item.Name.toLowerCase().includes(kw2));
                return textMatch;
            }
        });

        if (ev && !isFresh) {
            filtered.sort((a, b) => {
                const evA = a.Event.split('/').find(e => e.replace(/_\d{3}$/, '') === ev) || '';
                const evB = b.Event.split('/').find(e => e.replace(/_\d{3}$/, '') === ev) || '';
                const seqA = evA.match(/_(\d{3})$/) ? parseInt(evA.match(/_(\d{3})$/)[1], 10) : 999;
                const seqB = evB.match(/_(\d{3})$/) ? parseInt(evB.match(/_(\d{3})$/)[1], 10) : 999;
                return seqA - seqB;
            });
        }

        document.getElementById('searchCount').innerText = `剩餘筆數: ${filtered.length > 48 ? '48+' : filtered.length} (顯示上限48筆)`;
        filtered = filtered.slice(0, 48);

        const gridContainer = document.createElement('div');
        gridContainer.className = 'search-grid-container';
        resDiv.appendChild(gridContainer);

        // 分成四組，每組12個
        for (let i = 0; i < 4; i++) {
            const chunk = filtered.slice(i * 12, (i + 1) * 12);
            if (chunk.length === 0 && i > 0) break;

            const columnDiv = document.createElement('div');
            columnDiv.className = 'search-column';
            gridContainer.appendChild(columnDiv);

            chunk.forEach((item, chunkIdx) => {
                const globalIdx = (i * 12) + chunkIdx;
                const card = document.createElement('div');
                card.className = 'card';
                
                if (isFresh) {
                    if (item.Type === 'I35') {
                        card.innerHTML = `
                            <div class="card-title">${item.Name} (${item.Type})</div>
                            <div class="card-actions no-print">
                                <button class="btn-warning"  onclick="showI35Barcode('${item.ID}', 0, 3, 'bc_${globalIdx}')">3</button>
                                <button class="btn-warning"  onclick="showI35Barcode('${item.ID}', 0, 5, 'bc_${globalIdx}')">5</button>
                                <button class="btn-primary"  onclick="showI35Barcode('${item.ID}', 1, 3, 'bc_${globalIdx}')">3+</button>
                                <button class="btn-primary"  onclick="showI35Barcode('${item.ID}', 1, 5, 'bc_${globalIdx}')">5+</button>
                            </div>
                            <div class="barcode-wrapper"><svg id="bc_${globalIdx}" class="barcode"></svg></div>
                        `;
                    } else {
                        // I24：直接顯示今日+明日兩條 EAN13 條碼，不顯示按鈕
                        card.innerHTML = `
                            <div class="card-title">${item.Name} (${item.Type})</div>
                            <div class="barcode-wrapper"><svg id="bc_${globalIdx}_0" class="barcode"></svg></div>
                            <div class="barcode-wrapper"><svg id="bc_${globalIdx}_1" class="barcode"></svg></div>
                        `;
                    }
                } else {
                    const hideNormalShortcuts = !isFresh && !showShortcuts;
                    card.innerHTML = `
                        <div class="card-title">${item.Name}</div>
                        <div class="card-sub">${item.C1} | ${item.Event}</div>
                        <div class="barcode-wrapper"><svg id="bc_${globalIdx}" class="barcode"></svg></div>
                        <div class="card-actions no-print" style="display: ${hideNormalShortcuts ? 'none' : 'flex'};">
                            <button class="btn-yellow" onclick="actionCard('${item.ID}', 'reclassify')">✋分類</button>
                            <button class="btn-pink" onclick="actionCard('${item.ID}', 'qa')">📅品保</button>
                            <button class="btn-primary" onclick="actionCard('${item.ID}', 'order')">🛒訂貨</button>
                            <button class="btn-danger" onclick="actionCard('${item.ID}', 'delete')">🗑️刪除</button>
                            <button class="btn-lightblue" onclick="actionCard('${item.ID}', 'lock')">${item.Locked === 'True' ? '🔓解鎖' : '🔒鎖定'}</button>
                        </div>
                    `;
                }
                columnDiv.appendChild(card);
                if (!isFresh) {
                    renderBarcode(`bc_${globalIdx}`, item.ID, item.Type);
                } else if (item.Type === 'I24') {
                    // 掛上 DOM 後立即渲染今日與明日兩條 EAN13
                    renderI24Barcode(item.ID, 0, `bc_${globalIdx}_0`);
                    renderI24Barcode(item.ID, 1, `bc_${globalIdx}_1`);
                }
            });
        }
    }

    // ── EAN13 第13碼計算 ──
    function calcEAN13Check(digits12) {
        let sum = 0;
        for (let i = 0; i < 12; i++) {
            sum += parseInt(digits12[i]) * (i % 2 === 0 ? 1 : 3);
        }
        return ((10 - (sum % 10)) % 10).toString();
    }

    // ── I35 按鈕觸發：ID(8碼) + Julian日(3碼) + 份數(1碼) → 12碼 → EAN13 ──
    function showI35Barcode(id, julianOffset, copies, svgId) {
        const julian = getJulian(julianOffset);
        const raw12  = id + julian + copies;
        console.log(`I35 條碼組合：ID=${id}(${id.length}碼) + Julian=${julian}(${julian.length}碼) + 份數=${copies} → raw12=${raw12}(${raw12.length}碼)`);
        if (raw12.length !== 12 || isNaN(Number(raw12))) {
            alert(`條碼位數錯誤！\nID=${id}（${id.length}碼）\nJulian=${julian}（${julian.length}碼）\n份數=${copies}（1碼）\n合計=${raw12}（${raw12.length}碼，需恰好12碼且全為數字）`);
            return;
        }
        const ean13 = raw12 + calcEAN13Check(raw12);
        try {
            JsBarcode(`#${svgId}`, ean13, {
                format: 'EAN13', displayValue: true, height: 40, margin: 2, width: 1.8
            });
        } catch(e) { console.error('I35 barcode error:', e, ean13); }
    }

    // ── I24 自動渲染：ID(8碼) + Julian日(3碼) + 1(1碼) → 12碼 → EAN13 ──
    function renderI24Barcode(id, julianOffset, svgId) {
        const julian = getJulian(julianOffset);
        const raw12  = id + julian + '1';
        console.log(`I24 條碼組合：ID=${id}(${id.length}碼) + Julian=${julian}(${julian.length}碼) + 1 → raw12=${raw12}(${raw12.length}碼)`);
        if (raw12.length !== 12 || isNaN(Number(raw12))) {
            console.warn(`I24 條碼位數錯誤：${raw12}（${raw12.length}碼）`);
            return;
        }
        const ean13 = raw12 + calcEAN13Check(raw12);
        try {
            JsBarcode(`#${svgId}`, ean13, {
                format: 'EAN13', displayValue: true, height: 40, margin: 2, width: 1.8
            });
        } catch(e) { console.error('I24 barcode error:', e, ean13); }
    }

    function actionCard(id, action) {
        let item = db.find(i => i.ID === id);
        if (!item) return;
        if (action === 'delete') {
            if (confirm(`確定刪除 ${item.Name}？`)) {
                db = db.filter(i => i.ID !== id);
                saveData(); renderSearch();
            }
        } else if (action === 'lock') {
            item.Locked = item.Locked === 'True' ? 'False' : 'True';
            saveData(); renderSearch();
        } else if (action === 'order') {
            let evArr = item.Event ? item.Event.split('/').filter(Boolean) : [];
            if (!evArr.includes('待訂貨')) evArr.push('待訂貨');
            item.Event = evArr.join('/');
            saveData(); renderSearch();
        } else if (action === 'reclassify') {
            const c1s = [...new Set(db.map(i=>i.C1).filter(Boolean))].sort((a,b) => a.localeCompare(b,'zh-TW'));
            let opts = c1s.map(c => `<option value="${c}">${c}</option>`).join('');
            let newC1 = prompt(`目前分類：${item.C1}\n輸入新分類名稱，或留空選擇現有分類`);
            if (newC1 !== null) {
                item.C1 = newC1.trim() || item.C1;
                saveData(); renderSearch();
            }
        } else if (action === 'qa') {
            const picker = document.getElementById('hiddenDatePicker');
            picker.onchange = function() {
                if (picker.value) {
                    const dateStr = picker.value.replace(/-/g, '');
                    let expArr = item.Expiry ? item.Expiry.split('/').filter(Boolean) : [];
                    if (!expArr.includes(dateStr)) expArr.push(dateStr);
                    item.Expiry = cleanArrayStr(expArr.join('/'), true);
                    saveData(); renderSearch();
                }
                picker.onchange = null;
            };
            picker.click();
        }
    }

    // --- 3. 勘誤頁面 ---
    function renderError() {
        const idGroups = {};
        db.forEach(item => {
            if(!idGroups[item.ID]) idGroups[item.ID] = [];
            idGroups[item.ID].push(item);
        });
        const conflicts = [];
        let totalDupItems = 0; let totalDupBatches = 0;
        for (const [id, group] of Object.entries(idGroups)) {
            if (group.length > 1) {
                totalDupItems += group.length; totalDupBatches++;
                const types = [...new Set(group.map(i=>i.Type))];
                const names = [...new Set(group.map(i=>i.Name))];
                const c1s = [...new Set(group.map(i=>i.C1))];
                if(types.length > 1 || names.length > 1 || c1s.length > 1 || group.some(i=>i.Locked!=='True')) {
                    conflicts.push({id, group, types, names, c1s});
                }
            }
        }
        document.getElementById('errorStats').innerText = `總重複筆數: ${totalDupItems} | 總批數: ${totalDupBatches}`;
        const res = document.getElementById('errorResult');
        res.innerHTML = '';
        conflicts.forEach(c => {
            const card = document.createElement('div');
            card.className = 'card';
            let html = `<div class="card-title">ID: ${c.id}</div>`;
            ['types', 'names', 'c1s'].forEach((cat, idx) => {
                let colorClass = idx === 0 ? 'btn-pink' : (idx === 1 ? 'btn-yellow' : 'btn-lightblue');
                html += `<div class="card-actions">`;
                c[cat].forEach(val => {
                    html += `<button class="${colorClass}" onclick="resolveConflict('${c.id}', '${cat}', '${val}')">${val}</button>`;
                });
                html += `</div>`;
            });
            if (c.types.length === 1 && c.names.length === 1 && c.c1s.length === 1) {
                html += `<div class="card-actions" style="margin-top:15px;"><button class="btn-primary" style="width:100%" onclick="mergeConflict('${c.id}')">🔒鎖定合併</button></div>`;
            }
            card.innerHTML = html;
            res.appendChild(card);
        });
    }

    function resolveConflict(id, category, value) {
        db.filter(i => i.ID === id).forEach(item => {
            if(category === 'types') item.Type = value;
            if(category === 'names') item.Name = value;
            if(category === 'c1s') item.C1 = value;
        });
        saveData(); renderError();
    }

    function mergeConflict(id) {
        let group = db.filter(i => i.ID === id);
        let master = group[0];
        let allExpiry = group.map(i => i.Expiry).join('/');
        let allEvent = group.map(i => i.Event).join('/');
        master.Expiry = cleanArrayStr(allExpiry, true);
        master.Event = cleanArrayStr(allEvent, false, master.Name, master.ID);
        master.Locked = 'True';
        db = db.filter(i => i.ID !== id);
        db.push(master);
        saveData(); renderError();
    }

    // --- 4. 品保頁面 ---
    function renderQA() {
        const showBc = document.getElementById('qaBarcodeToggle').checked;
        const resDiv = document.getElementById('qaResult');
        resDiv.innerHTML = '';

        const now = new Date();
        const currentYearMonth = now.getFullYear() * 100 + (now.getMonth() + 1);
        const nextMonthDate = new Date(now.getFullYear(), now.getMonth() + 1, 1);
        const nextYearMonth = nextMonthDate.getFullYear() * 100 + (nextMonthDate.getMonth() + 1);

        const expMap = {};
        db.forEach(item => {
            if(item.Expiry) {
                item.Expiry.split('/').forEach(d => {
                    if(d) {
                        if(!expMap[d]) expMap[d] = [];
                        expMap[d].push(item);
                    }
                });
            }
        });
        const sortedDates = Object.keys(expMap).sort();
        if(sortedDates.length === 0) return;

        // ── 建立所有群組 DOM ──
        function makeGroupEl(date, dateIdx) {
            const items = expMap[date];
            const ym = parseInt(date.substring(0, 6));
            let bgClass = '';
            if (ym <= currentYearMonth)    bgClass = 'bg-month-current';
            else if (ym === nextYearMonth) bgClass = 'bg-month-next';
            else                            bgClass = 'bg-month-future';

            const groupDiv = document.createElement('div');
            groupDiv.className = `qa-group ${bgClass}`;

            const titleDiv = document.createElement('div');
            titleDiv.className = 'qa-group-title';
            titleDiv.innerHTML = `
                <span>到期日: ${date}</span>
                <button class="btn-danger no-print" style="float:right; padding:1px 6px; font-size:11px; margin-top:-2px;" onclick="removeQA('${date}')">全批下架</button>
            `;
            groupDiv.appendChild(titleDiv);

            const itemsRow = document.createElement('div');
            itemsRow.className = 'qa-items-row';
            const itemHalf   = Math.ceil(items.length / 2);
            const leftItems  = items.slice(0, itemHalf);
            const rightItems = items.slice(itemHalf);

            [leftItems, rightItems].forEach((colItems, colIdx) => {
                const col = document.createElement('div');
                col.className = 'qa-items-col';
                colItems.forEach((item, idx) => {
                    const side  = colIdx === 0 ? 'L' : 'R';
                    const svgId = `qa_${dateIdx}_${side}${idx}`;
                    const card  = document.createElement('div');
                    card.className = 'qa-item-card';
                    card.innerHTML = `
                        <div class="qa-item-actions no-print">
                            <button class="btn-warning" style="padding:1px 6px; font-size:11px;" onclick="removeQA('${date}', '${item.ID}')">下架</button>
                        </div>
                        <div class="qa-item-title">${item.Name}</div>
                        ${showBc ? `<div><svg id="${svgId}" class="barcode"></svg></div>` : ''}
                    `;
                    col.appendChild(card);
                });
                itemsRow.appendChild(col);
            });

            groupDiv.appendChild(itemsRow);
            return { groupDiv, date, dateIdx, leftItems, rightItems };
        }

        // ── 步驟1：建立測量盒，寬度固定為A4單欄寬 ──
        // A4可用寬730px，兩欄各362px（含gap）
        const PRINT_COL_WIDTH = 362;
        const measureBox = document.createElement('div');
        measureBox.style.cssText = `position:fixed; visibility:hidden; pointer-events:none; width:${PRINT_COL_WIDTH}px; left:-9999px; top:0; z-index:-1; overflow:hidden;`;
        document.body.appendChild(measureBox);

        // ── 步驟2：把每個群組放進測量盒量真實高度（不用clone）──
        const groupEls = sortedDates.map((date, dateIdx) => makeGroupEl(date, dateIdx));

        const heights = groupEls.map(({ groupDiv }) => {
            measureBox.innerHTML = '';
            measureBox.appendChild(groupDiv);          // 放入原始節點
            const h = groupDiv.offsetHeight + 6;       // +6 gap
            return h;
        });

        // 量完後清空測量盒，節點稍後再放進正式容器
        measureBox.innerHTML = '';
        document.body.removeChild(measureBox);

        // ── 步驟3：以A4實際列印高度為基準分頁 ──
        // A4高297mm，上下各留10mm邊距 = 277mm
        // 列印時瀏覽器實際渲染DPI通常是96，但iOS Safari列印用的是CSS px
        // 1mm = 3.7795px（CSS標準），277mm = 1047px
        const pageH = Math.floor(277 * 3.7795);

        // 貪心分配：左欄先填，滿了換右欄，右欄滿了換下一頁左欄
        const pages = []; // 每頁 = { left: [idx,...], right: [idx,...] }
        let curPage = { left: [], right: [] };
        let leftH = 0, rightH = 0;
        let fillingLeft = true;

        groupEls.forEach((_, i) => {
            const h = heights[i];
            if (fillingLeft) {
                if (leftH + h <= pageH) {
                    curPage.left.push(i);
                    leftH += h;
                } else {
                    // 左欄滿，切換到右欄
                    fillingLeft = false;
                    curPage.right.push(i);
                    rightH += h;
                }
            } else {
                if (rightH + h <= pageH) {
                    curPage.right.push(i);
                    rightH += h;
                } else {
                    // 右欄也滿，換新頁
                    pages.push(curPage);
                    curPage = { left: [i], right: [] };
                    leftH = h;
                    rightH = 0;
                    fillingLeft = true;
                }
            }
        });
        pages.push(curPage); // 最後一頁

        // ── 步驟4：渲染到畫面 ──
        // qaResult 設為 flex-column，每頁一個 qa-page-row
        pages.forEach((page, pageIdx) => {
            const pageDiv = document.createElement('div');
            pageDiv.className = 'qa-page-row';
            if (pageIdx > 0) pageDiv.style.marginTop = '20px';

            const leftCol  = document.createElement('div');
            leftCol.className  = 'qa-col';
            const rightCol = document.createElement('div');
            rightCol.className = 'qa-col';

            page.left.forEach(i  => leftCol.appendChild(groupEls[i].groupDiv));
            page.right.forEach(i => rightCol.appendChild(groupEls[i].groupDiv));

            pageDiv.appendChild(leftCol);
            pageDiv.appendChild(rightCol);
            resDiv.appendChild(pageDiv);
        });

        // ── 步驟5：渲染條碼（DOM 已掛上）──
        if(showBc) {
            groupEls.forEach(({ date, dateIdx, leftItems, rightItems }) => {
                leftItems.forEach((item, idx) => {
                    try { renderBarcode(`qa_${dateIdx}_L${idx}`, item.ID, item.Type); } catch(e) {}
                });
                rightItems.forEach((item, idx) => {
                    try { renderBarcode(`qa_${dateIdx}_R${idx}`, item.ID, item.Type); } catch(e) {}
                });
            });
        }

        // ── 步驟6：計算scale，讓730px內容縮放適應螢幕寬度 ──
        function applyScale() {
            const wrapper = document.getElementById('qaResultWrapper');
            const wrapperW = wrapper.offsetWidth || window.innerWidth - 20;
            const scale = Math.min(1, wrapperW / 730);
            resDiv.style.transform = `scale(${scale})`;
            // 縮放後調整外層高度，避免留白
            wrapper.style.height = (resDiv.scrollHeight * scale) + 'px';
        }
        applyScale();
        window.addEventListener('resize', applyScale);

        // 列印時移除scale，讓內容以原始大小輸出
        const printHandler = () => { resDiv.style.transform = 'none'; };
        const afterHandler = () => { applyScale(); };
        window.removeEventListener('beforeprint', window._qaPrintHandler);
        window.removeEventListener('afterprint',  window._qaAfterHandler);
        window._qaPrintHandler = printHandler;
        window._qaAfterHandler = afterHandler;
        window.addEventListener('beforeprint', printHandler);
        window.addEventListener('afterprint',  afterHandler);
    }

    function removeQA(date, itemId = null) {
        db.forEach(item => {
            if (!itemId || item.ID === itemId) {
                if (item.Expiry.includes(date)) {
                    item.Expiry = item.Expiry.split('/').filter(d => d !== date).join('/');
                }
            }
        });
        saveData(); renderQA();
    }

    // --- 5. 分類頁面 ---
    function renderClassify() {
        const c1s = [...new Set(db.map(i=>i.C1).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-TW'));
        const sel = document.getElementById('classifySelect');
        sel.innerHTML = `<option value="">選擇分類</option><option value="NEW_CATEGORY">-- 新增分類 --</option>`;
        c1s.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        document.getElementById('newCategoryInput').style.display = 'none';
        const res = document.getElementById('classifyResult');
        let unclass = db.filter(i => i.C1 === '未分類').slice(0, 50);
        let html = '';
        unclass.forEach(item => {
            html += `<div class="card flex-row">
                        <input type="checkbox" class="class-chk" value="${item.ID}" style="flex:0; width:20px; height:20px;">
                        <span style="flex:1">${item.Name}</span>
                     </div>`;
        });
        res.innerHTML = html;
    }

    function handleClassifySelect() {
        if(document.getElementById('classifySelect').value === 'NEW_CATEGORY') {
            document.getElementById('newCategoryInput').style.display = 'block';
        } else {
            document.getElementById('newCategoryInput').style.display = 'none';
        }
    }

    function applyClassification() {
        let targetC1 = document.getElementById('classifySelect').value;
        if (targetC1 === 'NEW_CATEGORY') targetC1 = document.getElementById('newCategoryInput').value.trim();
        if (!targetC1) return alert("請輸入或選擇分類");
        const checkedIds = Array.from(document.querySelectorAll('.class-chk:checked')).map(cb => cb.value);
        if(!checkedIds.length) return alert("請勾選項目");
        db.forEach(item => { if(checkedIds.includes(item.ID)) item.C1 = targetC1; });
        saveData(); renderClassify();
    }

    // --- 6. 活動頁面 ---
    function renderActivity() {
        const events = new Set();
        db.forEach(i => i.Event.split('/').forEach(e => { 
            if(e) events.add(e.replace(/_\d{3}$/, '')); 
        }));
        const tagsDiv = document.getElementById('activityTags');
        tagsDiv.innerHTML = '';
        events.forEach(cleanName => {
            const btn = document.createElement('button');
            btn.innerText = `✖ ${cleanName}`;
            btn.onclick = () => {
                if(confirm(`清除所有「${cleanName}」活動標籤？`)) {
                    db.forEach(item => {
                        item.Event = item.Event.split('/').filter(ev => ev.replace(/_\d{3}$/, '') !== cleanName).join('/');
                    });
                    saveData(); renderActivity();
                }
            };
            tagsDiv.appendChild(btn);
        });
    }

    function searchActivity() {
        const inputElement = document.getElementById('activitySearch');
        const resDiv = document.getElementById('activitySearchResult');
        if (!inputElement || !resDiv) return;
        const inputText = inputElement.value.trim();
        if (!inputText) { resDiv.innerHTML = ''; return; }
        const lines = inputText.split('\n').map(line => line.trim()).filter(Boolean);
        let foundItems = [], missingItems = [];
        lines.forEach(keyword => {
            const lowerKW = keyword.toLowerCase();
            let match = db.find(item => 
                (item.ID && item.ID.toLowerCase().includes(lowerKW)) || 
                (item.Name && item.Name.toLowerCase().includes(lowerKW))
            );
            if (match) foundItems.push(match);
            else missingItems.push(keyword);
        });
        resDiv.innerHTML = '';
        if (foundItems.length > 0) {
            const foundTitle = document.createElement('div');
            foundTitle.style.fontWeight = 'bold';
            foundTitle.style.color = '#28a745';
            foundTitle.style.marginTop = '10px';
            foundTitle.innerText = `✅ 已找到 (${foundItems.length} 筆)：`;
            resDiv.appendChild(foundTitle);
            foundItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.style.padding = '5px';
                itemDiv.style.borderBottom = '1px solid #eee';
                itemDiv.innerText = `${item.ID} - ${item.Name} (${item.C1})`;
                resDiv.appendChild(itemDiv);
            });
        }
        if (missingItems.length > 0) {
            const missingContainer = document.createElement('div');
            missingContainer.style.marginTop = '15px';
            missingContainer.style.padding = '10px';
            missingContainer.style.border = '1px solid #ff4d4f';
            missingContainer.style.borderRadius = '4px';
            missingContainer.style.backgroundColor = '#fff1f0';
            missingContainer.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <span style="color: #ff4d4f; font-weight: bold;">❌ 未搜尋到 (${missingItems.length} 筆)：</span>
                    <button onclick="copyMissingToClipboard()" style="font-size: 12px; padding: 2px 8px; cursor: pointer;">一鍵複製</button>
                </div>
                <textarea id="missingItemsTextarea" readonly style="width: 100%; height: 100px; font-size: 12px; border: 1px solid #ffa39e; padding: 5px;">${missingItems.join('\n')}</textarea>
            `;
            resDiv.appendChild(missingContainer);
        }
    }

    function copyMissingToClipboard() {
        const textArea = document.getElementById('missingItemsTextarea');
        if (textArea) { textArea.select(); document.execCommand('copy'); alert('未找到名單已複製！'); }
    }

    function addActivity() {
        const evName = document.getElementById('activityInput').value.trim();
        if(!evName) return alert('請輸入活動名稱');
        const text = document.getElementById('activitySearch').value;
        const keywords = text.split('\n').filter(k => k.trim());
        let added = 0;
        let seq = 1;
        keywords.forEach(kw => {
            let matches = db.filter(i => 
                (i.Name && i.Name.toLowerCase().includes(kw.trim().toLowerCase())) || 
                (i.ID && i.ID.toLowerCase().includes(kw.trim().toLowerCase()))
            );
            matches.forEach(item => {
                item.Event = item.Event.split('/').filter(e => e.replace(/_\d{3}$/, '') !== evName).join('/');
                let seqStr = seq.toString().padStart(3, '0');
                let newEv = `${evName}_${seqStr}`;
                item.Event = cleanArrayStr(`${item.Event}/${newEv}`, false, item.Name, item.ID);
                added++;
            });
            if (matches.length > 0) seq++; 
        });
        saveData();
        alert(`已成功加入 ${added} 筆活動標籤`);
        renderActivity();
    }
</script>
</body>
