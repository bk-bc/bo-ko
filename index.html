<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧零售管理系統 v5.0</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
    :root {
        --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107;
        --pink: hotpink; --yellow: gold; --lightblue: lightblue;
        --bg-color: #f4f6f9; --card-bg: #ffffff;
    }
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { margin: 0; padding: 0; background-color: var(--bg-color); padding-bottom: 60px; }
    
    header {
        position: sticky; top: 0; z-index: 1000; background: #fff;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 10px; margin-bottom: 15px;
    }
    .header-stats { font-size: 0.85em; color: #666; margin-bottom: 5px; }
    .nav-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
    .nav-buttons button { flex: 1 1 auto; padding: 8px; border: 1px solid #ddd; background: #f8f9fa; border-radius: 4px; cursor: pointer; }
    .nav-buttons button.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    .container { padding: 0 10px; max-width: 100%; margin: 0 auto; }
    .section { display: none; }
    .section.active { display: block; }

    /* --- 核心修正：搜尋結果網格佈局 --- */
    #searchResult {
        display: grid !important;
        /* 平板以上自動多排 (最小 280px) */
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
        padding: 10px 0;
        align-items: stretch;
    }

    .card { 
        background: var(--card-bg); 
        border-radius: 8px; 
        padding: 12px; 
        /* 移除 margin-bottom，改用 grid 的 gap */
        margin-bottom: 0 !important; 
        box-shadow: 0 1px 4px rgba(0,0,0,0.1); 
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        border: 1px solid #eee;
    }

    /* 手機版強制單排 (寬度小於 540px) */
    @media (max-width: 540px) {
        #searchResult {
            grid-template-columns: 1fr !important;
        }
    }

    .card-title { font-weight: bold; font-size: 1.05em; margin-bottom: 5px; word-break: break-all; color: #333; }
    .card-sub { font-size: 0.85em; color: #666; margin-bottom: 8px; }
    .card-actions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
    button { padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-warning { background: var(--warning); color: black; }
    
    .flex-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
    .flex-row > * { flex: 1; }
    
    svg.barcode { width: 100%; max-height: 90px; margin-top: 5px; }

    /* 品保顏色修正 (修正了原本的全形大括號) */
    .bg-danger-light { background-color: #ffe6e6 !important; }
    .bg-warning-light { background-color: #fff3cd !important; }

    @media print {
        header, .no-print, .card-actions { display: none !important; }
        .print-container { display: block !important; column-count: 2; }
    }
</style>

</head>
<body>

<header>
    <div class="header-stats" id="headerStats">資料統計：總導入 0 | 合併數 0 | 總筆數 0</div>
    <div class="flex-row">
        <input type="file" id="csvFile" accept=".csv" style="flex: 2; margin-bottom: 0;">
        <button class="btn-primary" onclick="importCSV()">匯入 CSV</button>
        <button class="btn-success" onclick="exportCSV()">匯出 CSV</button>
    </div>
    <div class="nav-buttons" style="margin-top: 10px;">
        <button onclick="switchTab('add')" id="btn-add" class="active">新增</button>
        <button onclick="switchTab('search')" id="btn-search">搜尋</button>
        <button onclick="switchTab('error')" id="btn-error">勘誤</button>
        <button onclick="switchTab('qa')" id="btn-qa">品保</button>
        <button onclick="switchTab('classify')" id="btn-classify">分類</button>
        <button onclick="switchTab('activity')" id="btn-activity">活動</button>
    </div>
</header>

<div class="container">
    <div id="add" class="section active">
        <h3>新增資料</h3>
        <select id="addType">
            <option value="EAN8">EAN8</option><option value="EAN13">EAN13</option>
            <option value="UPCA">UPCA</option><option value="UPCE">UPCE</option>
            <option value="I35">I35</option><option value="I24">I24</option>
        </select>
        <textarea id="addInput" rows="6" placeholder="請輸入資料，每行格式：ID/Name"></textarea>
        <button class="btn-primary" onclick="addItems()" style="width: 100%;">新增</button>
    </div>

    <div id="search" class="section">
       <div class="flex-row no-print">
    <label><input type="checkbox" id="freshFoodCheck" onchange="renderSearch()"> 鮮食</label>
    <label><input type="checkbox" id="hideQuickActions" onchange="renderSearch()"> 關閉快捷</label> 
    <button class="btn-warning" onclick="quickFilter('待訂貨')">待訂貨</button>
    <button class="btn-success" onclick="clearOrder()">已訂貨</button>
</div>

        <div id="searchFilters" class="no-print">
            <div class="flex-row">
                <select id="searchC1" onchange="renderSearch()"><option value="">C1: 全部搜尋</option></select>
                <select id="searchEvent" onchange="renderSearch()"><option value="">Event: 全部搜尋</option></select>
            </div>
            <div class="flex-row">
                <input type="text" id="searchKeyword1" placeholder="關鍵字 1 (ID/Name)" oninput="renderSearch()">
                <input type="text" id="searchKeyword2" placeholder="關鍵字 2 (ID/Name)" oninput="renderSearch()">
            </div>
        </div>
        <div class="header-stats" id="searchCount"></div>
        <div id="searchResult"></div>
    </div>

    <div id="error" class="section">
        <div class="header-stats" id="errorStats"></div>
        <div id="errorResult"></div>
    </div>

    <div id="qa" class="section">
        <div class="flex-row no-print">
            <label><input type="checkbox" id="qaBarcodeToggle" checked onchange="renderQA()"> 顯示條碼</label>
            <button class="btn-primary" onclick="window.print()">列印</button>
        </div>
        <div id="qaResult" class="print-container"></div>
    </div>

    <div id="classify" class="section">
        <div class="flex-row">
            <select id="classifySelect" onchange="handleClassifySelect()">
                <option value="">選擇分類</option>
                <option value="NEW_CATEGORY">-- 新增分類 --</option>
            </select>
            <input type="text" id="newCategoryInput" placeholder="輸入新分類名稱" style="display:none; flex:1; margin-bottom:0;">
            <button class="btn-primary" onclick="applyClassification()">分類</button>
        </div>
        <div id="classifyResult"></div>
    </div>

    <div id="activity" class="section">
        <div id="activityTags" class="nav-buttons" style="margin-bottom: 10px;"></div>
        <input type="text" id="activityInput" placeholder="輸入活動名稱">
        <textarea id="activitySearch" rows="4" placeholder="貼上多行關鍵字搜尋 Name" oninput="searchActivity()"></textarea>
        <div id="activitySearchResult" style="margin-bottom:10px; font-size:0.9em; color:#555;"></div>
        <button class="btn-primary" onclick="addActivity()" style="width: 100%;">加入活動</button>
    </div>
</div>
<input type="date" id="hiddenDatePicker" style="position:fixed; top:-100px; left:-100px; opacity:0;">

<script>
    // --- 核心資料狀態 ---
    let db = []; 
    let stats = { imported: 0, merged: 0 };

    // --- 初始化 ---
    window.onload = () => {
        const stored = localStorage.getItem('retailDB');
        if (stored) db = JSON.parse(stored);
        updateStatsUI();
        renderAddType();
    };

    function saveData() {
        localStorage.setItem('retailDB', JSON.stringify(db));
        updateStatsUI();
    }

    function switchTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-buttons button').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.getElementById(`btn-${tabId}`).classList.add('active');
        
        if(tabId === 'search') { document.getElementById('searchKeyword1').value=''; document.getElementById('searchKeyword2').value=''; populateSearchDropdowns(); renderSearch(); }
        if(tabId === 'error') renderError();
        if(tabId === 'qa') renderQA();
        if(tabId === 'classify') renderClassify();
        if(tabId === 'activity') renderActivity();
    }

    // --- 共用工具 ---
    function cleanArrayStr(str, isDate = false, itemName = '', itemID = '') {
        if (!str) return '';
        let arr = str.split('/').map(s => s.trim()).filter(Boolean);
        if (isDate) {
            arr = arr.filter(d => /^20\d{6}$/.test(d));
        } else {
            // Regex排除與Name或ID完全相同之Event
            const exactMatchRegex = new RegExp(`^(${escapeRegExp(itemName)}|${escapeRegExp(itemID)})$`, 'i');
            arr = arr.filter(e => !exactMatchRegex.test(e));
        }
        return [...new Set(arr)].join('/');
    }

    function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function updateStatsUI() {
        document.getElementById('headerStats').innerText = `資料統計：總導入 ${stats.imported} | 合併數 ${stats.merged} | 總筆數 ${db.length}`;
    }

    function getJulian(addDays = 0) {
        let d = new Date(); d.setDate(d.getDate() + addDays);
        let start = new Date(d.getFullYear(), 0, 0);
        let diff = (d - start) + ((start.getTimezoneOffset() - d.getTimezoneOffset()) * 60 * 1000);
        let oneDay = 1000 * 60 * 60 * 24;
        return Math.floor(diff / oneDay).toString().padStart(3, '0');
    }

    function renderBarcode(targetId, value, format) {
        try {
            JsBarcode(`#${targetId}`, value, {
                format: format.includes('EAN') || format.includes('UPC') ? format : 'CODE128',
                displayValue: true, height: 40, margin: 0, width: 2
            });
        } catch (e) {
            console.error("Barcode error:", e);
        }
    }

    // --- CSV 邏輯 ---
    function importCSV() {
        const file = document.getElementById('csvFile').files[0];
        if (!file) return alert('請選擇CSV檔案');
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let newImportCount = 0; let newMergeCount = 0;
            // 跳過標題行
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                // 處理CSV可能帶有引號的逗號，簡易版分割
                const parts = lines[i].split(',').map(s => s.trim().replace(/^"|"$/g, ''));
                if (parts.length < 7) continue;
                
                let [Type, ID, Name, C1, Expiry, Event, Locked] = parts;
                Type = Type.toUpperCase();
                Locked = (Locked === 'True') ? 'True' : 'False';
                newImportCount++;

                let existingIndex = db.findIndex(item => item.ID === ID);
                if (existingIndex > -1) {
                    let ex = db[existingIndex];
                    let isConflict = ex.Type !== Type || ex.Name !== Name || ex.C1 !== C1;
                    
                    if (!isConflict) {
                        // 完全相同，合併 Event/Expiry
                        ex.Expiry = cleanArrayStr(`${ex.Expiry}/${Expiry}`, true);
                        ex.Event = cleanArrayStr(`${ex.Event}/${Event}`, false, ex.Name, ex.ID);
                        if(Locked === 'True') ex.Locked = 'True';
                        newMergeCount++;
                    } else {
                        // 有衝突，檢查 Locked
                        if (Locked === 'True' || ex.Locked === 'True') {
                            let master = Locked === 'True' ? {Type, ID, Name, C1} : {Type:ex.Type, ID:ex.ID, Name:ex.Name, C1:ex.C1};
                            ex.Type = master.Type; ex.Name = master.Name; ex.C1 = master.C1;
                            ex.Expiry = cleanArrayStr(`${ex.Expiry}/${Expiry}`, true);
                            ex.Event = cleanArrayStr(`${ex.Event}/${Event}`, false, ex.Name, ex.ID);
                            ex.Locked = 'True';
                            newMergeCount++;
                        } else {
                            // 無鎖定且衝突，直接新增（勘誤頁面處理）
                            db.push({Type, ID, Name, C1, Expiry: cleanArrayStr(Expiry, true), Event: cleanArrayStr(Event, false, Name, ID), Locked});
                        }
                    }
                } else {
                    db.push({Type, ID, Name, C1, Expiry: cleanArrayStr(Expiry, true), Event: cleanArrayStr(Event, false, Name, ID), Locked});
                }
            }
            stats.imported += newImportCount;
            stats.merged += newMergeCount;
            saveData();
            alert(`匯入完成！新增/掃描 ${newImportCount} 筆，合併 ${newMergeCount} 筆。`);
        };
        reader.readAsText(file);
    }

    function exportCSV() {
        let csv = "Type,ID,Name,C1,Expiry,Event,Locked\n";
        db.forEach(row => {
            csv += `"${row.Type}","${row.ID}","${row.Name}","${row.C1}","${row.Expiry}","${row.Event}","${row.Locked}"\n`;
        });
        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `零售資料庫_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    }

    // --- 1. 新增功能 ---
    function renderAddType() { } // 靜態 HTML 已處理
    function addItems() {
        const type = document.getElementById('addType').value;
        const text = document.getElementById('addInput').value;
        const lines = text.split('\n').filter(l => l.trim());
        let added = 0;
        lines.forEach(line => {
            const [ID, Name] = line.split('/');
            if (ID && Name) {
                db.push({ Type: type, ID: ID.trim(), Name: Name.trim(), C1: '未分類', Expiry: '', Event: '', Locked: 'False' });
                added++;
            }
        });
        saveData();
        document.getElementById('addInput').value = '';
        alert(`成功新增 ${added} 筆資料`);
    }

    // --- 2. 搜尋功能 ---
    function populateSearchDropdowns() {
        const c1Set = new Set(), eventSet = new Set();
        db.forEach(item => {
            if(item.C1) c1Set.add(item.C1);
            if(item.Event) item.Event.split('/').forEach(e => { if(e) eventSet.add(e); });
        });
        let c1Html = `<option value="">C1: 全部搜尋</option>`;
        [...c1Set].forEach(c => c1Html += `<option value="${c}">${c}</option>`);
        document.getElementById('searchC1').innerHTML = c1Html;

        let evHtml = `<option value="">Event: 全部搜尋</option>`;
        [...eventSet].forEach(e => evHtml += `<option value="${e}">${e}</option>`);
        document.getElementById('searchEvent').innerHTML = evHtml;
    }

    function quickFilter(status) {
        document.getElementById('freshFoodCheck').checked = false;
        document.getElementById('searchEvent').value = status;
        renderSearch();
    }
    
    function clearOrder() {
        db.forEach(item => {
            if(item.Event.includes('待訂貨')) {
                item.Event = item.Event.split('/').filter(e => e !== '待訂貨').join('/');
            }
        });
        saveData();
        renderSearch();
    }

  function renderSearch() {
    const isFresh = document.getElementById('freshFoodCheck').checked;
    const hideActions = document.getElementById('hideQuickActions').checked; // 確保有這一行
    const c1 = document.getElementById('searchC1').value;
    const ev = document.getElementById('searchEvent').value;
    const kw1 = document.getElementById('searchKeyword1').value.trim().toLowerCase();
    const kw2 = document.getElementById('searchKeyword2').value.trim().toLowerCase();
    const resDiv = document.getElementById('searchResult');
    const searchFilters = document.getElementById('searchFilters');

    // 1. 先清空舊結果
    resDiv.innerHTML = '';
    const actionStyle = hideActions ? 'display: none;' : 'display: flex;';

    // 2. 處理 UI 顯示/隱藏
    if (isFresh) {
        document.getElementById('searchC1').style.display = 'none';
        document.getElementById('searchEvent').style.display = 'none';
        document.getElementById('searchKeyword2').style.display = 'none';
        if (kw1.length < 1) {
            document.getElementById('searchCount').innerText = '請輸入鮮食名稱進行搜尋...';
            return;
        }
    } else {
        document.getElementById('searchC1').style.display = 'block';
        document.getElementById('searchEvent').style.display = 'block';
        document.getElementById('searchKeyword2').style.display = 'block';
        if (kw1.length < 1 && kw2.length < 1 && !c1 && !ev) {
            document.getElementById('searchCount').innerText = '輸入關鍵字或選擇篩選項目...';
            return;
        }
    }

    // 3. 執行過濾邏輯 (你原本漏掉這段)
    let filtered = db.filter(item => {
        if (isFresh) {
            if (item.Type !== 'I24' && item.Type !== 'I35') return false;
            return item.Name.toLowerCase().includes(kw1);
        } else {
            if (c1 && item.C1 !== c1) return false;
            if (ev && !item.Event.split('/').includes(ev)) return false;
            return (kw1 === '' || item.ID.toLowerCase().includes(kw1) || item.Name.toLowerCase().includes(kw1)) &&
                   (kw2 === '' || item.ID.toLowerCase().includes(kw2) || item.Name.toLowerCase().includes(kw2));
        }
    });

    document.getElementById('searchCount').innerText = `剩餘筆數: ${filtered.length > 50 ? '50+' : filtered.length}`;

    // 4. 開始渲染卡片
    filtered.slice(0, 50).forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'card';
        
        if (isFresh) {
            card.innerHTML = `
                <div class="card-title">${item.Name} (${item.Type})</div>
                <div class="card-actions" style="${actionStyle}">
                    <button class="btn-warning" onclick="showFreshBarcode('${item.ID}', '${item.Type}', 0, 1, 'bc_${idx}')">今日到期</button>
                    <button class="btn-warning" onclick="showFreshBarcode('${item.ID}', '${item.Type}', 1, 1, 'bc_${idx}')">明日到期</button>
                    ${item.Type === 'I35' ? `
                        <button class="btn-primary" onclick="showFreshBarcode('${item.ID}', '${item.Type}', 0, 3, 'bc_${idx}')">一配</button>
                        <button class="btn-primary" onclick="showFreshBarcode('${item.ID}', '${item.Type}', 0, 5, 'bc_${idx}')">二配</button>
                    ` : ''}
                </div>
                <div style="text-align:center; margin-top:10px;"><svg id="bc_${idx}" class="barcode"></svg></div>
            `;
        } else {
            card.innerHTML = `
                <div class="card-title">${item.Name}</div>
                <div class="card-sub">${item.C1} | ${item.Event}</div>
                <div style="text-align:center;"><svg id="bc_${idx}" class="barcode"></svg></div>
                <div class="card-actions" style="${actionStyle}">
                    <button class="btn-yellow" onclick="actionCard('${item.ID}', 'reclassify')">✋分類</button>
                    <button class="btn-pink" onclick="actionCard('${item.ID}', 'qa')">📅品保</button>
                    <button class="btn-primary" onclick="actionCard('${item.ID}', 'order')">🛒訂貨</button>
                    <button class="btn-danger" onclick="actionCard('${item.ID}', 'delete')">🗑️刪除</button>
                    <button class="btn-lightblue" onclick="actionCard('${item.ID}', 'lock')">${item.Locked === 'True' ? '🔓解鎖' : '🔒鎖定'}</button>
                </div>
            `;
        }
        resDiv.appendChild(card);
        if (!isFresh) renderBarcode(`bc_${idx}`, item.ID, item.Type);
    });
}

                            <button class="btn-primary" onclick="showFreshBarcode('${item.ID}', '${item.Type}', 0, 5, 'bc_${idx}')">二配</button>
                        ` : ''}
                    </div>
                    <div style="text-align:center; margin-top:10px;"><svg id="bc_${idx}" class="barcode"></svg></div>
                `;
            } else {
                card.innerHTML = `
                    <div class="card-title">${item.Name}</div>
                    <div class="card-sub">${item.C1} | ${item.Event}</div>
                    <div style="text-align:center;"><svg id="bc_${idx}" class="barcode"></svg></div>
                    <div class="card-actions">
                        <button class="btn-yellow" onclick="actionCard('${item.ID}', 'reclassify')">✋分類</button>
                        <button class="btn-pink" onclick="actionCard('${item.ID}', 'qa')">📅品保</button>
                        <button class="btn-primary" onclick="actionCard('${item.ID}', 'order')">🛒訂貨</button>
                        <button class="btn-danger" onclick="actionCard('${item.ID}', 'delete')">🗑️刪除</button>
                        <button class="btn-lightblue" onclick="actionCard('${item.ID}', 'lock')">${item.Locked === 'True' ? '🔓解鎖' : '🔒鎖定'}</button>
                    </div>
                `;
            }
            resDiv.appendChild(card);
            if (!isFresh) renderBarcode(`bc_${idx}`, item.ID, item.Type);
        });
    }

    function showFreshBarcode(id, type, dayOffset, deliveryCode, svgId) {
        // ID (pad/trim to 8) + Julian (3) + Delivery (1) = 12 digits
        let baseId = id.padEnd(8, '0').substring(0, 8);
        let julian = getJulian(dayOffset);
        let code12 = baseId + julian + deliveryCode;
        renderBarcode(svgId, code12, 'EAN13'); // JsBarcode will auto-calculate check digit for 12 digits
    }

    function actionCard(id, action) {
        let items = db.filter(i => i.ID === id);
        if(!items.length) return;
        let mainItem = items[0]; // Simplified for now, applied to first match

        if (action === 'reclassify') {
            mainItem.C1 = '未分類';
        } else if (action === 'qa') {
        // 改用隱藏的 date input 觸發原生月曆
        const datePicker = document.getElementById('hiddenDatePicker');
        
        // 監聽日期變更事件
        datePicker.onchange = function() {
            if (this.value) {
                // 將 yyyy-mm-dd 轉換為 yyyymmdd
                const formattedDate = this.value.replace(/-/g, '');
                mainItem.Expiry = cleanArrayStr(`${mainItem.Expiry}/${formattedDate}`, true);
                saveData();
                renderSearch();
                this.value = ''; // 清空以利下次選取
            }
        };
        
        // 觸發點擊，彈出手機/電腦系統內建的月曆
        datePicker.showPicker(); 
        }  else if (action === 'order') {
            mainItem.Event = cleanArrayStr(`${mainItem.Event}/待訂貨`, false);
        } else if (action === 'delete') {
            if(confirm('確認刪除？')) db = db.filter(i => i.ID !== id);
        } else if (action === 'lock') {
            mainItem.Locked = mainItem.Locked === 'True' ? 'False' : 'True';
        }
        saveData(); renderSearch();
    }

    // --- 3. 勘誤頁面 ---
    function renderError() {
        const idGroups = {};
        db.forEach(item => {
            if(!idGroups[item.ID]) idGroups[item.ID] = [];
            idGroups[item.ID].push(item);
        });
        
        const conflicts = [];
        let totalDupItems = 0; let totalDupBatches = 0;
        
        for (const [id, group] of Object.entries(idGroups)) {
            if (group.length > 1) {
                totalDupItems += group.length; totalDupBatches++;
                const types = [...new Set(group.map(i=>i.Type))];
                const names = [...new Set(group.map(i=>i.Name))];
                const c1s = [...new Set(group.map(i=>i.C1))];
                if(types.length > 1 || names.length > 1 || c1s.length > 1 || group.some(i=>i.Locked!=='True')) {
                    conflicts.push({id, group, types, names, c1s});
                }
            }
        }
        
        document.getElementById('errorStats').innerText = `總重複筆數: ${totalDupItems} | 總批數: ${totalDupBatches}`;
        const res = document.getElementById('errorResult');
        res.innerHTML = '';
        
        conflicts.forEach(c => {
            const card = document.createElement('div');
            card.className = 'card';
            let html = `<div class="card-title">ID: ${c.id}</div>`;
            
            ['types', 'names', 'c1s'].forEach((cat, idx) => {
                let colorClass = idx === 0 ? 'btn-pink' : (idx === 1 ? 'btn-yellow' : 'btn-lightblue');
                html += `<div class="card-actions">`;
                c[cat].forEach(val => {
                    html += `<button class="${colorClass}" onclick="resolveConflict('${c.id}', '${cat}', '${val}')">${val}</button>`;
                });
                html += `</div>`;
            });
            
            // Check if ready to merge (all cats have 1 unique value)
            if (c.types.length === 1 && c.names.length === 1 && c.c1s.length === 1) {
                html += `<div class="card-actions" style="margin-top:15px;"><button class="btn-primary" style="width:100%" onclick="mergeConflict('${c.id}')">🔒鎖定合併</button></div>`;
            }
            card.innerHTML = html;
            res.appendChild(card);
        });
    }

    function resolveConflict(id, category, value) {
        db.filter(i => i.ID === id).forEach(item => {
            if(category === 'types') item.Type = value;
            if(category === 'names') item.Name = value;
            if(category === 'c1s') item.C1 = value;
        });
        saveData(); renderError();
    }

    function mergeConflict(id) {
        let group = db.filter(i => i.ID === id);
        let master = group[0];
        let allExpiry = group.map(i => i.Expiry).join('/');
        let allEvent = group.map(i => i.Event).join('/');
        
        master.Expiry = cleanArrayStr(allExpiry, true);
        master.Event = cleanArrayStr(allEvent, false, master.Name, master.ID);
        master.Locked = 'True';
        
        // Remove others
        db = db.filter(i => i.ID !== id);
        db.push(master);
        saveData(); renderError();
    }

    // --- 4. 品保頁面 ---
    function renderQA() {
        const showBc = document.getElementById('qaBarcodeToggle').checked;
        const resDiv = document.getElementById('qaResult');
        resDiv.innerHTML = '';
        
        const now = new Date();
        const yyyymm = now.getFullYear() * 100 + (now.getMonth() + 1);
        const yyyymm1 = now.getFullYear() * 100 + (now.getMonth() + 2); // Simplistic month math
        const yyyymm2 = now.getFullYear() * 100 + (now.getMonth() + 3);

        const expMap = {}; // { '20260315': [items] }
        db.forEach(item => {
            if(item.Expiry) {
                item.Expiry.split('/').forEach(d => {
                    if(d) {
                        if(!expMap[d]) expMap[d] = [];
                        expMap[d].push(item);
                    }
                });
            }
        });

        Object.keys(expMap).sort().forEach(date => {
            const ym = parseInt(date.substring(0, 6));
            if (ym > yyyymm2) return; // Only show up to next 2 months
            
            let bgClass = '';
            if (ym <= yyyymm) bgClass = 'bg-danger-light';
            else if (ym <= yyyymm2) bgClass = 'bg-warning-light';

            const groupDiv = document.createElement('div');
            groupDiv.className = `card ${bgClass}`;
            let html = `<div class="card-title flex-row">
                            <span>到期日: ${date}</span>
                            <button class="btn-danger no-print" style="flex:0;" onclick="removeQA('${date}')">全批下架</button>
                        </div>`;
            
            expMap[date].forEach((item, idx) => {
                let svgId = `qa_${date}_${idx}`;
                html += `
                    <div style="border-top:1px dashed #ccc; padding-top:5px; margin-top:5px;">
                        <div class="flex-row">
                            <span style="flex:1">${item.Name}</span>
                            <button class="btn-warning no-print" style="flex:0;" onclick="removeQA('${date}', '${item.ID}')">下架</button>
                        </div>
                        ${showBc ? `<div style="text-align:center;"><svg id="${svgId}" class="barcode"></svg></div>` : ''}
                    </div>
                `;
            });
            groupDiv.innerHTML = html;
            resDiv.appendChild(groupDiv);
            
            if(showBc) {
                expMap[date].forEach((item, idx) => {
                    renderBarcode(`qa_${date}_${idx}`, item.ID, item.Type);
                });
            }
        });
    }

    function removeQA(date, itemId = null) {
        db.forEach(item => {
            if (!itemId || item.ID === itemId) {
                if (item.Expiry.includes(date)) {
                    item.Expiry = item.Expiry.split('/').filter(d => d !== date).join('/');
                }
            }
        });
        saveData(); renderQA();
    }

    // --- 5. 分類頁面 ---
    function renderClassify() {
        const c1s = [...new Set(db.map(i=>i.C1).filter(Boolean))];
        const sel = document.getElementById('classifySelect');
        sel.innerHTML = `<option value="">選擇分類</option><option value="NEW_CATEGORY">-- 新增分類 --</option>`;
        c1s.forEach(c => sel.innerHTML += `<option value="${c}">${c}</option>`);
        document.getElementById('newCategoryInput').style.display = 'none';
        
        const res = document.getElementById('classifyResult');
        let unclass = db.filter(i => i.C1 === '未分類').slice(0, 50);
        let html = '';
        unclass.forEach(item => {
            html += `<div class="card flex-row">
                        <input type="checkbox" class="class-chk" value="${item.ID}" style="flex:0; width:20px; height:20px;">
                        <span style="flex:1">${item.Name}</span>
                     </div>`;
        });
        res.innerHTML = html;
    }

    function handleClassifySelect() {
        if(document.getElementById('classifySelect').value === 'NEW_CATEGORY') {
            document.getElementById('newCategoryInput').style.display = 'block';
        } else {
            document.getElementById('newCategoryInput').style.display = 'none';
        }
    }

    function applyClassification() {
        let targetC1 = document.getElementById('classifySelect').value;
        if (targetC1 === 'NEW_CATEGORY') targetC1 = document.getElementById('newCategoryInput').value.trim();
        if (!targetC1) return alert("請輸入或選擇分類");

        const checkedIds = Array.from(document.querySelectorAll('.class-chk:checked')).map(cb => cb.value);
        if(!checkedIds.length) return alert("請勾選項目");

        db.forEach(item => {
            if(checkedIds.includes(item.ID)) item.C1 = targetC1;
        });
        saveData(); renderClassify();
    }

    // --- 6. 活動頁面 ---
    function renderActivity() {
        const events = new Set();
        db.forEach(i => i.Event.split('/').forEach(e => { if(e) events.add(e); }));
        const tagsDiv = document.getElementById('activityTags');
        tagsDiv.innerHTML = '';
        events.forEach(e => {
            const btn = document.createElement('button');
            btn.innerText = `✖ ${e}`;
            btn.onclick = () => {
                if(confirm(`清除所有「${e}」活動標籤？`)) {
                    db.forEach(item => {
                        item.Event = item.Event.split('/').filter(ev => ev !== e).join('/');
                    });
                    saveData(); renderActivity();
                }
            };
            tagsDiv.appendChild(btn);
        });
    }

    function searchActivity() {
        const text = document.getElementById('activitySearch').value;
        const keywords = text.split('\n').filter(k => k.trim());
        const res = document.getElementById('activitySearchResult');
        res.innerHTML = '';
        
        keywords.forEach(kw => {
            let matches = db.filter(i => i.Name.toLowerCase().includes(kw.trim().toLowerCase()));
            let p = document.createElement('div');
            if(matches.length === 0) {
                p.innerText = `${kw}：未搜尋到`;
                p.style.color = 'red';
            } else {
                p.innerText = `${kw}：找到 ${matches[0].Name} ` + (matches.length>1 ? `(${matches.length}筆重複)` : '');
            }
            res.appendChild(p);
        });
    }

    function addActivity() {
        const evName = document.getElementById('activityInput').value.trim();
        if(!evName) return alert('請輸入活動名稱');
        const text = document.getElementById('activitySearch').value;
        const keywords = text.split('\n').filter(k => k.trim());
        
        let added = 0;
        keywords.forEach(kw => {
            db.filter(i => i.Name.toLowerCase().includes(kw.trim().toLowerCase())).forEach(item => {
                item.Event = cleanArrayStr(`${item.Event}/${evName}`, false, item.Name, item.ID);
                added++;
            });
        });
        saveData();
        alert(`已成功加入 ${added} 筆活動標籤`);
        renderActivity();
    }

</script>
